<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>


    <section class="toma-section">

    <div class="toma-container">

        <!-- Hot Seller -->
        <div class="toma-badge" data-aos="zoom-in" data-aos-delay="100">
            <img src="images/Hot seller icon.png" alt="Hot Seller">
        </div>

        <!-- Title -->
        <div class="toma-title" data-aos="fade-up" data-aos-delay="200">
            <img src="images/Inana Paste.png" alt="Tomato Paste">
        </div>

        <!-- Description -->
        <div class="toma-desc" data-aos="fade-up" data-aos-delay="300">
            <img src="images/Rich text5.png" alt="Tomato paste description">
        </div>

        <!-- Product Image -->
        <div class="toma-image" data-aos="zoom-in-up" data-aos-delay="400">
            <img src="images/Tomato image.png" alt="Tomato paste product">
        </div>

        <!-- Bottom -->
        <div class="toma-bottom" data-aos="fade-up" data-aos-delay="500">

            <div class="toma-price">
                <img src="images/Starting text200.png" alt="Starting from 200">
            </div>

            <a href="#" class="toma-button" data-aos="pulse" data-aos-delay="600">
                <img src="images/Buy now icon.png" alt="Buy Now">
            </a>

        </div>

    </div>

</section>



    
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 900,
            once: true,
            offset: 120,
            easing: "ease-out-cubic"
        });
    </script>

</body>

</html>
